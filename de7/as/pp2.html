    <h1>グループプロジェクト６</h1>
    
    <p>fusionのフォーム昨日を使い、切り株の造形に挑戦している。</p>
    <P>うまくいったこととしては、一辺が15㎝立方体のサイズまで印刷できたこと。</P>
    <p>また、サポートが取りやすい造形ができたこと。</p>
    <br>
    <p>うまくいかなかったこととしては、下の部分が反ってしまったこと。</p>
    <p>反らないようにするために、あらかじめ反った状態の造形を作ってもいいかもしれない。</p>
    <p>さらに、プレートの透明なテープをいかに空気を入れずに貼れるかが重要である。</p>
